<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2.5D Mario World</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Courier New', Courier, monospace; 
            background-color: #5c94fc; 
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 20px;
            text-shadow: 2px 2px 0px #000;
            user-select: none;
            display: flex;
            gap: 40px;
            z-index: 10;
        }
        #game-over, #victory {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 40px;
            text-shadow: 3px 3px 0px #000;
            display: none;
            text-align: center;
            z-index: 10;
        }
        #instructions {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 16px;
            text-shadow: 1px 1px 0px #000;
            z-index: 10;
            background: rgba(0,0,0,0.4);
            padding: 8px 16px;
            border-radius: 5px;
            text-align: center;
        }
    </style>
    <!-- Include Three.js via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="ui">
        <div>MARIO<br><span id="score">000000</span></div>
        <div>COINS<br>x<span id="coins">00</span></div>
        <div>WORLD<br>1-1</div>
        <div>TIME<br><span id="timer">400</span></div>
    </div>
    <div id="game-over">GAME OVER<br><span style="font-size: 20px;">Press R to restart</span></div>
    <div id="victory">YOU WIN!<br><span style="font-size: 20px;">Press R to restart</span></div>
    <div id="instructions">A / D or Arrow Keys to Move • Space / W to Jump • R to Restart</div>

    <script>
        // Game state variables
        let gameOver = false;
        let victory = false;
        let score = 0;
        let coinsCount = 0;
        let timeRemaining = 400;
        let timerInterval = null;

        // Snappy physics constants
        const GRAVITY = -0.016;
        const TERMINAL_VELOCITY = -0.35;

        // Playable character settings
        const player = {
            width: 0.8,
            height: 1.2,
            x: 2,
            y: 2,
            vx: 0,
            vy: 0,
            speed: 0.15,
            jumpForce: 0.32,
            grounded: false,
            mesh: null
        };

        // Track active game entities
        const solids = [];
        const enemies = [];
        const coins = [];
        const particles = [];
        let flagpole = null;

        // Three.js Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x5c94fc); // Sky Blue

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(2, 4, 11);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Add Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.62);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.78);
        dirLight.position.set(10, 20, 15);
        scene.add(dirLight);

        // Controller input tracking
        const keys = { Left: false, Right: false, Jump: false };
        window.addEventListener('keydown', (e) => {
            if (e.code === 'KeyA' || e.code === 'ArrowLeft') keys.Left = true;
            if (e.code === 'KeyD' || e.code === 'ArrowRight') keys.Right = true;
            if (e.code === 'Space' || e.code === 'KeyW' || e.code === 'ArrowUp') keys.Jump = true;
            if (e.code === 'KeyR') resetGame();
        });
        window.addEventListener('keyup', (e) => {
            if (e.code === 'KeyA' || e.code === 'ArrowLeft') keys.Left = false;
            if (e.code === 'KeyD' || e.code === 'ArrowRight') keys.Right = false;
            if (e.code === 'Space' || e.code === 'KeyW' || e.code === 'ArrowUp') keys.Jump = false;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 3D Box Builder Helper
        function createBox(x, y, w, h, d, color) {
            const geometry = new THREE.BoxGeometry(w, h, d);
            const material = new THREE.MeshPhongMaterial({ color: color });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(x + w / 2, y + h / 2, 0);
            scene.add(mesh);
            return mesh;
        }

        // Detailed Retro 3D Mario Model Builder
        function createPlayerMesh() {
            const group = new THREE.Group();

            // Torso (Blue overalls over red shirt)
            const torsoGeo = new THREE.BoxGeometry(0.6, 0.55, 0.5);
            const torsoMat = new THREE.MeshPhongMaterial({ color: 0x0020C2 });
            const torso = new THREE.Mesh(torsoGeo, torsoMat);
            torso.position.y = 0.55;
            group.add(torso);

            // Red shirt sleeves/shoulders
            const shirtGeo = new THREE.BoxGeometry(0.72, 0.35, 0.42);
            const shirtMat = new THREE.MeshPhongMaterial({ color: 0xE52521 });
            const shirt = new THREE.Mesh(shirtGeo, shirtMat);
            shirt.position.set(0, 0.65, 0);
            group.add(shirt);

            // Yellow overall buttons
            const buttonGeo = new THREE.BoxGeometry(0.08, 0.08, 0.08);
            const buttonMat = new THREE.MeshPhongMaterial({ color: 0xFFD700 });
            const btnL = new THREE.Mesh(buttonGeo, buttonMat);
            btnL.position.set(-0.15, 0.55, 0.26);
            const btnR = new THREE.Mesh(buttonGeo, buttonMat);
            btnR.position.set(0.15, 0.55, 0.26);
            group.add(btnL, btnR);

            // Left leg and shoe
            const leftLeg = new THREE.Group();
            leftLeg.position.set(-0.16, 0.28, 0);
            const legLMesh = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.28, 0.3), torsoMat);
            legLMesh.position.y = 0.14;
            const shoeLMesh = new THREE.Mesh(new THREE.BoxGeometry(0.26, 0.14, 0.38), new THREE.MeshPhongMaterial({ color: 0x8B4513 }));
            shoeLMesh.position.set(0, -0.02, 0.04);
            leftLeg.add(legLMesh, shoeLMesh);
            group.add(leftLeg);

            // Right leg and shoe
            const rightLeg = new THREE.Group();
            rightLeg.position.set(0.16, 0.28, 0);
            const legRMesh = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.28, 0.3), torsoMat);
            legRMesh.position.y = 0.14;
            const shoeRMesh = new THREE.Mesh(new THREE.BoxGeometry(0.26, 0.14, 0.38), new THREE.MeshPhongMaterial({ color: 0x8B4513 }));
            shoeRMesh.position.set(0, -0.02, 0.04);
            rightLeg.add(legRMesh, shoeRMesh);
            group.add(rightLeg);

            // Head assembly
            const headGroup = new THREE.Group();
            headGroup.position.set(0, 1.02, 0);

            // Face
            const faceGeo = new THREE.BoxGeometry(0.44, 0.38, 0.44);
            const faceMat = new THREE.MeshPhongMaterial({ color: 0xFFCC99 });
            const face = new THREE.Mesh(faceGeo, faceMat);
            headGroup.add(face);

            // Nose
            const noseGeo = new THREE.BoxGeometry(0.16, 0.14, 0.16);
            const nose = new THREE.Mesh(noseGeo, faceMat);
            nose.position.set(0, 0, 0.24);
            headGroup.add(nose);

            // Mustache
            const mustacheGeo = new THREE.BoxGeometry(0.28, 0.08, 0.1);
            const mustacheMat = new THREE.MeshPhongMaterial({ color: 0x1a0d00 });
            const mustache = new THREE.Mesh(mustacheGeo, mustacheMat);
            mustache.position.set(0, -0.09, 0.23);
            headGroup.add(mustache);

            // Eyes
            const eyeGeo = new THREE.BoxGeometry(0.08, 0.12, 0.04);
            const eyeMat = new THREE.MeshPhongMaterial({ color: 0x000000 });
            const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
            eyeL.position.set(-0.11, 0.08, 0.23);
            const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
            eyeR.position.set(0.12, 0.08, 0.23);
            headGroup.add(eyeL, eyeR);

            // Red cap
            const capBaseGeo = new THREE.BoxGeometry(0.48, 0.12, 0.48);
            const capBase = new THREE.Mesh(capBaseGeo, shirtMat);
            capBase.position.y = 0.22;
            
            const capVisorGeo = new THREE.BoxGeometry(0.48, 0.04, 0.14);
            const capVisor = new THREE.Mesh(capVisorGeo, shirtMat);
            capVisor.position.set(0, 0.18, 0.24);

            const emblemGeo = new THREE.BoxGeometry(0.14, 0.14, 0.02);
            const emblemMat = new THREE.MeshPhongMaterial({ color: 0xFFFFFF });
            const emblem = new THREE.Mesh(emblemGeo, emblemMat);
            emblem.position.set(0, 0.22, 0.25);

            headGroup.add(capBase, capVisor, emblem);
            group.add(headGroup);

            scene.add(group);
            group.userData = { leftLeg, rightLeg };
            return group;
        }

        // Goomba 3D Mesh Builder
        function createGoombaMesh() {
            const group = new THREE.Group();

            const headGeo = new THREE.SphereGeometry(0.38, 16, 16);
            const headMat = new THREE.MeshPhongMaterial({ color: 0x964B00 });
            const head = new THREE.Mesh(headGeo, headMat);
            head.position.y = 0.38;
            group.add(head);

            const eyeGeo = new THREE.SphereGeometry(0.07, 8, 8);
            const eyeMat = new THREE.MeshPhongMaterial({ color: 0xFFFFFF });
            const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
            eyeL.position.set(-0.14, 0.42, 0.32);
            const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
            eyeR.position.set(0.14, 0.42, 0.32);
            group.add(eyeL, eyeR);

            const pupilGeo = new THREE.SphereGeometry(0.03, 8, 8);
            const pupilMat = new THREE.MeshPhongMaterial({ color: 0x000000 });
            const pupilL = new THREE.Mesh(pupilGeo, pupilMat);
            pupilL.position.set(-0.14, 0.42, 0.38);
            const pupilR = new THREE.Mesh(pupilGeo, pupilMat);
            pupilR.position.set(0.14, 0.42, 0.38);
            group.add(pupilL, pupilR);

            const footGeo = new THREE.BoxGeometry(0.2, 0.1, 0.2);
            const footMat = new THREE.MeshPhongMaterial({ color: 0x1a0d00 });
            const footL = new THREE.Mesh(footGeo, footMat);
            footL.position.set(-0.14, 0.05, 0);
            const footR = new THREE.Mesh(footGeo, footMat);
            footR.position.set(0.14, 0.05, 0);
            group.add(footL, footR);

            scene.add(group);
            return group;
        }

        // Koopa Troopa 3D Mesh Builder
        function createKoopaMesh() {
            const group = new THREE.Group();

            // Shell container
            const shellGeo = new THREE.SphereGeometry(0.35, 16, 16);
            const shellMat = new THREE.MeshPhongMaterial({ color: 0x228B22 }); // Green Shell
            const shell = new THREE.Mesh(shellGeo, shellMat);
            shell.scale.set(1, 1.2, 1);
            shell.position.y = 0.44;
            shell.name = "shell";
            group.add(shell);

            // Exposed fleshy body parts
            const bodyGroup = new THREE.Group();
            bodyGroup.name = "body";

            const bodyGeo = new THREE.CylinderGeometry(0.15, 0.15, 0.4, 16);
            const fleshMat = new THREE.MeshPhongMaterial({ color: 0xFFD700 }); // Yellow skin
            const body = new THREE.Mesh(bodyGeo, fleshMat);
            body.position.y = 0.44;
            bodyGroup.add(body);

            const headGeo = new THREE.SphereGeometry(0.22, 16, 16);
            const head = new THREE.Mesh(headGeo, fleshMat);
            head.position.set(0, 0.74, 0.1);
            bodyGroup.add(head);

            const eyeGeo = new THREE.SphereGeometry(0.05, 8, 8);
            const eyeMat = new THREE.MeshPhongMaterial({ color: 0xFFFFFF });
            const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
            eyeL.position.set(-0.1, 0.78, 0.24);
            const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
            eyeR.position.set(0.1, 0.78, 0.24);
            bodyGroup.add(eyeL, eyeR);

            const footGeo = new THREE.BoxGeometry(0.16, 0.12, 0.24);
            const footL = new THREE.Mesh(footGeo, fleshMat);
            footL.position.set(-0.16, 0.06, 0.05);
            const footR = new THREE.Mesh(footGeo, fleshMat);
            footR.position.set(0.16, 0.06, 0.05);
            bodyGroup.add(footL, footR);

            group.add(bodyGroup);
            scene.add(group);
            return group;
        }

        // Piranha Plant 3D Mesh Builder
        function createPiranhaMesh() {
            const group = new THREE.Group();

            const stemGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.8, 16);
            const stemMat = new THREE.MeshPhongMaterial({ color: 0x228B22 });
            const stem = new THREE.Mesh(stemGeo, stemMat);
            stem.position.y = 0.4;
            group.add(stem);

            const headGeo = new THREE.SphereGeometry(0.34, 16, 16);
            const headMat = new THREE.MeshPhongMaterial({ color: 0xE52521 }); // Red head
            const head = new THREE.Mesh(headGeo, headMat);
            head.position.y = 0.82;
            group.add(head);

            // White dots representation
            const dotGeo = new THREE.SphereGeometry(0.06, 8, 8);
            const dotMat = new THREE.MeshPhongMaterial({ color: 0xFFFFFF });
            const dots = [
                {x: -0.18, y: 0.95, z: 0.18},
                {x: 0.18, y: 0.95, z: 0.18},
                {x: 0.22, y: 0.75, z: 0.18},
                {x: -0.22, y: 0.75, z: 0.18},
                {x: 0, y: 0.85, z: -0.24}
            ];
            dots.forEach(d => {
                const dot = new THREE.Mesh(dotGeo, dotMat);
                dot.position.set(d.x, d.y, d.z);
                group.add(dot);
            });

            scene.add(group);
            return group;
        }

        // Pipe builder
        function createPipeMesh(x, y, w, h) {
            const group = new THREE.Group();

            const shaftGeo = new THREE.CylinderGeometry(w / 2 - 0.1, w / 2 - 0.1, h - 0.4, 24);
            const pipeMat = new THREE.MeshPhongMaterial({ color: 0x00A800 });
            const shaft = new THREE.Mesh(shaftGeo, pipeMat);
            shaft.position.set(x + w / 2, y + (h - 0.4) / 2, 0);
            group.add(shaft);

            const rimGeo = new THREE.CylinderGeometry(w / 2, w / 2, 0.4, 24);
            const rim = new THREE.Mesh(rimGeo, pipeMat);
            rim.position.set(x + w / 2, y + h - 0.2, 0);
            group.add(rim);

            scene.add(group);
            return group;
        }

        // Flagpole builder
        function createFlagpoleMesh(x, y, w, h) {
            const group = new THREE.Group();

            const poleGeo = new THREE.CylinderGeometry(w / 2, w / 2, h, 16);
            const poleMat = new THREE.MeshPhongMaterial({ color: 0xCCCCCC });
            const pole = new THREE.Mesh(poleGeo, poleMat);
            pole.position.set(x + w / 2, y + h / 2, 0);
            group.add(pole);

            const flagGeo = new THREE.BoxGeometry(1.5, 1, 0.05);
            const flagMat = new THREE.MeshPhongMaterial({ color: 0x228B22 }); // Green Flag
            const flag = new THREE.Mesh(flagGeo, flagMat);
            flag.position.set(x - 0.75 + w / 2, y + h - 1, 0);
            group.add(flag);

            scene.add(group);
            return group;
        }

        // Shatter Bricks Effect
        function breakBrick(block) {
            scene.remove(block.mesh);
            const index = solids.indexOf(block);
            if (index > -1) {
                solids.splice(index, 1);
            }

            const partGeo = new THREE.BoxGeometry(0.24, 0.24, 0.24);
            const partMat = new THREE.MeshPhongMaterial({ color: 0xCD853F });

            for (let i = 0; i < 4; i++) {
                const pm = new THREE.Mesh(partGeo, partMat);
                const offsetX = (i % 2 === 0 ? -0.2 : 0.2);
                const offsetY = (i < 2 ? -0.2 : 0.2);
                pm.position.set(block.x + block.w / 2 + offsetX, block.y + block.h / 2 + offsetY, 0);
                scene.add(pm);

                particles.push({
                    mesh: pm,
                    vx: offsetX * 0.28 + (Math.random() - 0.5) * 0.08,
                    vy: offsetY * 0.28 + 0.12 + Math.random() * 0.08,
                    life: 25
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.mesh.position.x += p.vx;
                p.mesh.position.y += p.vy;
                p.vy += GRAVITY;
                p.life--;

                if (p.life <= 0) {
                    scene.remove(p.mesh);
                    particles.splice(i, 1);
                }
            }
        }

        // Scoreboard mechanics
        function addScore(amount) {
            score += amount;
            document.getElementById('score').innerText = String(score).padStart(6, '0');
        }

        function addCoin() {
            coinsCount++;
            document.getElementById('coins').innerText = String(coinsCount).padStart(2, '0');
            addScore(200);
        }

        function triggerGameOver() {
            if (gameOver || victory) return;
            gameOver = true;
            document.getElementById('game-over').style.display = 'block';
        }

        function triggerVictory() {
            if (gameOver || victory) return;
            victory = true;
            document.getElementById('victory').style.display = 'block';
        }

        function spawnCoinFromBlock(x, y) {
            addCoin();
            const geometry = new THREE.CylinderGeometry(0.22, 0.22, 0.08, 16);
            const material = new THREE.MeshPhongMaterial({ color: 0xFFD700 });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.rotation.x = Math.PI / 2;
            mesh.position.set(x, y, 0);
            scene.add(mesh);

            let frame = 0;
            function animateCoin() {
                if (frame < 12) {
                    mesh.position.y += 0.2;
                    mesh.rotation.y += 0.18;
                    frame++;
                    requestAnimationFrame(animateCoin);
                } else {
                    scene.remove(mesh);
                }
            }
            animateCoin();
        }

        // Map building functions
        function buildLevel() {
            enemies.length = 0;
            coins.length = 0;
            solids.length = 0;

            // Background Puffs
            createCloud(5, 7.5, -4);
            createCloud(18, 9, -5);
            createCloud(32, 8.5, -4);
            createCloud(48, 10, -6);
            createCloud(62, 7.5, -4);

            // Spaced out blueprint details to ensure comfortable clearing
            const levelBlueprint = [
                // Ground boundaries
                { type: 'ground', x: 0, y: -1, w: 20, h: 2 },
                { type: 'ground', x: 23, y: -1, w: 18, h: 2 },
                { type: 'ground', x: 44, y: -1, w: 32, h: 2 },

                // Green Pipes
                { type: 'pipe', x: 11, y: 1, w: 2, h: 2 },
                { type: 'pipe', x: 33, y: 1, w: 2, h: 3 },

                // Blocks, items, and breakable bricks
                { type: 'brick', x: 5, y: 4.2, w: 1, h: 1 },
                { type: 'qblock', x: 6, y: 4.2, w: 1, h: 1 },
                { type: 'brick', x: 7, y: 4.2, w: 1, h: 1 },
                { type: 'qblock', x: 8, y: 4.2, w: 1, h: 1 },
                { type: 'brick', x: 9, y: 4.2, w: 1, h: 1 },

                // Segment 2 details
                { type: 'brick', x: 26, y: 4.2, w: 3, h: 1 },
                { type: 'qblock', x: 29, y: 7.2, w: 1, h: 1 },
                { type: 'brick', x: 31, y: 4.2, w: 2, h: 1 },

                // Steps layout
                { type: 'stair', x: 49, y: 1, w: 4, h: 1 },
                { type: 'stair', x: 50, y: 2, w: 3, h: 1 },
                { type: 'stair', x: 51, y: 3, w: 2, h: 1 },
                { type: 'stair', x: 52, y: 4, w: 1, h: 1 },

                // Flag Pole Coordinates
                { type: 'flagpole', x: 65, y: 1, w: 0.2, h: 8 }
            ];

            // Render static elements
            levelBlueprint.forEach(block => {
                if (block.type === 'ground') {
                    createBox(block.x, block.y, block.w, block.h - 0.2, 1.2, 0x8B4513);
                    createBox(block.x, block.y + block.h - 0.2, block.w, 0.2, 1.25, 0x228B22);
                    solids.push(block);
                }
                else if (block.type === 'brick') {
                    block.mesh = createBox(block.x, block.y, block.w, block.h, 1, 0xCD853F);
                    solids.push(block);
                }
                else if (block.type === 'qblock') {
                    block.mesh = createBox(block.x, block.y, block.w, block.h, 1, 0xFFD700);
                    block.hit = false;
                    solids.push(block);
                }
                else if (block.type === 'stair') {
                    createBox(block.x, block.y, block.w, block.h, 1, 0xD2B48C);
                    solids.push({ type: 'stair', x: block.x, y: block.y, w: block.w, h: block.h });
                }
                else if (block.type === 'pipe') {
                    block.mesh = createPipeMesh(block.x, block.y, block.w, block.h);
                    solids.push({ type: 'pipe', x: block.x, y: block.y, w: block.w, h: block.h });
                }
                else if (block.type === 'flagpole') {
                    block.mesh = createFlagpoleMesh(block.x, block.y, block.w, block.h);
                    flagpole = block;
                }
            });

            // Standalone collectibles
            const coinPositions = [
                { x: 6, y: 5.2 }, { x: 8, y: 5.2 },
                { x: 27, y: 5.2 }, { x: 28, y: 5.2 },
                { x: 50, y: 4.8 }
            ];
            coinPositions.forEach(loc => {
                const coin = { x: loc.x, y: loc.y, w: 0.6, h: 0.6, collected: false, mesh: null };
                const coinGeo = new THREE.CylinderGeometry(0.22, 0.22, 0.08, 16);
                const coinMat = new THREE.MeshPhongMaterial({ color: 0xFFD700 });
                const mesh = new THREE.Mesh(coinGeo, coinMat);
                mesh.rotation.x = Math.PI / 2;
                mesh.position.set(coin.x + coin.w / 2, coin.y + coin.h / 2, 0);
                scene.add(mesh);
                coin.mesh = mesh;
                coins.push(coin);
            });

            // Initialize Enemies
            // 1. Goombas
            const goombaPositions = [
                { x: 15, y: 1.5 },
                { x: 56, y: 1.5 }
            ];
            goombaPositions.forEach(loc => {
                enemies.push({
                    type: 'goomba',
                    x: loc.x, y: loc.y,
                    vx: -0.04, vy: 0,
                    w: 0.8, h: 0.8,
                    alive: true,
                    mesh: createGoombaMesh()
                });
            });

            // 2. Koopa Troopa
            enemies.push({
                type: 'koopa',
                x: 28, y: 1.5,
                vx: -0.035, vy: 0,
                w: 0.8, h: 1.2,
                state: 'walking', // 'walking', 'shell', 'sliding'
                alive: true,
                mesh: createKoopaMesh()
            });

            // 3. Piranha Plants (Stationary inside Pipe 2)
            enemies.push({
                type: 'piranha',
                x: 33.6, y: 4.0,
                baseY: 4.0, // Top of pipe 2
                offsetY: 0,
                dir: 1,
                timer: 0,
                w: 0.8, h: 1.0,
                alive: true,
                mesh: createPiranhaMesh()
            });
        }

        // Grounded Physics Processing
        function updatePhysics() {
            if (gameOver || victory) return;

            // X-axis calculations
            if (keys.Left) {
                player.vx = -player.speed;
            } else if (keys.Right) {
                player.vx = player.speed;
            } else {
                player.vx *= 0.8;
                if (Math.abs(player.vx) < 0.01) player.vx = 0;
            }

            // Apply X movement
            player.x += player.vx;
            resolveCollisions('x');

            // Y-axis calculations (Gravity and jumping)
            player.vy += GRAVITY;
            if (player.vy < TERMINAL_VELOCITY) player.vy = TERMINAL_VELOCITY;

            if (keys.Jump && player.grounded) {
                player.vy = player.jumpForce;
                player.grounded = false;
            }

            // Apply Y movement
            player.y += player.vy;
            player.grounded = false;
            resolveCollisions('y');

            // Handle death pit limit
            if (player.y < -5) {
                triggerGameOver();
            }

            // Sync visual placement
            player.mesh.position.set(player.x + player.width / 2, player.y + player.height / 2, 0);

            // Leg movement swing animations
            if (player.mesh.userData) {
                const uData = player.mesh.userData;
                if (!player.grounded) {
                    // Jump pose
                    uData.leftLeg.rotation.x = -0.55;
                    uData.rightLeg.rotation.x = 0.55;
                } else if (Math.abs(player.vx) > 0.01) {
                    // Swing legs while running
                    const swing = Math.sin(Date.now() * 0.014) * 0.72;
                    uData.leftLeg.rotation.x = swing;
                    uData.rightLeg.rotation.x = -swing;
                } else {
                    // Stand idle
                    uData.leftLeg.rotation.x = 0;
                    uData.rightLeg.rotation.x = 0;
                }
            }

            // Follow player smoothly
            camera.position.x = player.x + player.width / 2;
            camera.position.y = Math.max(4, player.y + 1.8);
            camera.lookAt(camera.position.x, 3, 0);
        }

        function resolveCollisions(axis) {
            const pRect = { x: player.x, y: player.y, w: player.width, h: player.height };

            for (let block of solids) {
                const bRect = { x: block.x, y: block.y, w: block.w, h: block.h };

                if (checkCollision(pRect, bRect)) {
                    if (axis === 'x') {
                        if (player.vx > 0) {
                            player.x = block.x - player.width;
                        } else if (player.vx < 0) {
                            player.x = block.x + block.w;
                        }
                        player.vx = 0;
                    } 
                    else if (axis === 'y') {
                        if (player.vy < 0) {
                            player.y = block.y + block.h;
                            player.grounded = true;
                        } else if (player.vy > 0) {
                            player.y = block.y - player.height;

                            // Dynamic box-hitting actions
                            if (block.type === 'qblock' && !block.hit) {
                                block.hit = true;
                                block.mesh.material.color.setHex(0x8B5A2B); // Dulling out the ? block color
                                spawnCoinFromBlock(block.x + block.w / 2, block.y + block.h + 0.5);
                            } 
                            else if (block.type === 'brick') {
                                breakBrick(block);
                                addScore(50);
                            }
                        }
                        player.vy = 0;
                    }
                    pRect.x = player.x;
                    pRect.y = player.y;
                }
            }
        }

        // Active enemy processing cycle
        function updateEnemies() {
            if (gameOver || victory) return;

            enemies.forEach(enemy => {
                if (!enemy.alive) return;

                const pRect = { x: player.x, y: player.y, w: player.width, h: player.height };
                let eRect = { x: enemy.x, y: enemy.y, w: enemy.w, h: enemy.h };

                // 1. Piranha Plant behavior
                if (enemy.type === 'piranha') {
                    enemy.timer++;
                    if (enemy.timer > 100) {
                        enemy.dir = -enemy.dir;
                        enemy.timer = 0;
                    }
                    // Emergence movement speed calculations
                    if (enemy.dir === 1 && enemy.offsetY < 0.8) {
                        enemy.offsetY += 0.015;
                    } else if (enemy.dir === -1 && enemy.offsetY > 0) {
                        enemy.offsetY -= 0.015;
                    }
                    enemy.y = enemy.baseY + enemy.offsetY - 0.4;
                    enemy.mesh.position.set(enemy.x, enemy.y, 0);

                    eRect = { x: enemy.x - enemy.w / 2, y: enemy.y, w: enemy.w, h: enemy.h };
                    if (checkCollision(pRect, eRect)) {
                        triggerGameOver();
                    }
                    return;
                }

                // 2. Goomba and Koopa behaviors
                if (enemy.type === 'goomba' || enemy.type === 'koopa') {
                    // Update horizontally
                    enemy.x += enemy.vx;

                    // Obstacle/Solid Turnbacks
                    eRect = { x: enemy.x, y: enemy.y, w: enemy.w, h: enemy.h };
                    for (let block of solids) {
                        const bRect = { x: block.x, y: block.y, w: block.w, h: block.h };
                        if (checkCollision(eRect, bRect)) {
                            enemy.vx = -enemy.vx;
                            enemy.x += enemy.vx;
                            break;
                        }
                    }

                    // Shell sliding kills other enemies
                    if (enemy.type === 'koopa' && enemy.state === 'sliding') {
                        enemies.forEach(other => {
                            if (other !== enemy && other.alive) {
                                let otherRect = { x: other.x, y: other.y, w: other.w, h: other.h };
                                if (other.type === 'piranha') {
                                    otherRect = { x: other.x - other.w / 2, y: other.y, w: other.w, h: other.h };
                                }
                                if (checkCollision(eRect, otherRect)) {
                                    other.alive = false;
                                    scene.remove(other.mesh);
                                    addScore(100);
                                }
                            }
                        });
                    }

                    // Gravitational effects
                    enemy.vy += GRAVITY;
                    enemy.y += enemy.vy;

                    // Floor alignments
                    eRect = { x: enemy.x, y: enemy.y, w: enemy.w, h: enemy.h };
                    for (let block of solids) {
                        const bRect = { x: block.x, y: block.y, w: block.w, h: block.h };
                        if (checkCollision(eRect, bRect)) {
                            if (enemy.vy < 0) {
                                enemy.y = block.y + block.h;
                                enemy.vy = 0;
                            }
                        }
                    }

                    // Check fall bounds
                    if (enemy.y < -5) {
                        enemy.alive = false;
                        scene.remove(enemy.mesh);
                        return;
                    }

                    // Sync graphics representation
                    enemy.mesh.position.set(enemy.x + enemy.w / 2, enemy.y + enemy.h / 2, 0);

                    // Hero intersections
                    eRect = { x: enemy.x, y: enemy.y, w: enemy.w, h: enemy.h };
                    if (checkCollision(pRect, eRect)) {
                        if (enemy.type === 'goomba') {
                            if (player.vy < 0 && player.y > enemy.y + enemy.h * 0.35) {
                                enemy.alive = false;
                                scene.remove(enemy.mesh);
                                player.vy = 0.24; // Stomp bounce
                                addScore(100);
                            } else {
                                triggerGameOver();
                            }
                        } 
                        else if (enemy.type === 'koopa') {
                            if (enemy.state === 'walking') {
                                if (player.vy < 0 && player.y > enemy.y + enemy.h * 0.35) {
                                    // Enter Shell State
                                    enemy.state = 'shell';
                                    enemy.vx = 0;
                                    player.vy = 0.24; // Bounce
                                    addScore(100);

                                    // Hide yellow body mesh parts to show green shell only
                                    const bodyMesh = enemy.mesh.getObjectByName("body");
                                    if (bodyMesh) bodyMesh.visible = false;
                                } else {
                                    triggerGameOver();
                                }
                            } 
                            else if (enemy.state === 'shell') {
                                // Kick the shell
                                enemy.state = 'sliding';
                                // Kick direction depends on which side Mario is on
                                if (player.x + player.width / 2 < enemy.x + enemy.w / 2) {
                                    enemy.vx = 0.25;
                                } else {
                                    enemy.vx = -0.25;
                                }
                                addScore(50);
                            } 
                            else if (enemy.state === 'sliding') {
                                if (player.vy < 0 && player.y > enemy.y + enemy.h * 0.35) {
                                    // Stop sliding shell
                                    enemy.state = 'shell';
                                    enemy.vx = 0;
                                    player.vy = 0.24;
                                    addScore(50);
                                } else {
                                    triggerGameOver();
                                }
                            }
                        }
                    }
                }
            });
        }

        // Rotates and handles floating coin pickups
        function updateCoins() {
            coins.forEach(coin => {
                if (coin.collected) return;

                coin.mesh.rotation.y += 0.05;

                const pRect = { x: player.x, y: player.y, w: player.width, h: player.height };
                const cRect = { x: coin.x, y: coin.y, w: coin.w, h: coin.h };

                if (checkCollision(pRect, cRect)) {
                    coin.collected = true;
                    scene.remove(coin.mesh);
                    addCoin();
                }
            });
        }

        // Trigger victory flagpole
        function checkFlagpole() {
            if (!flagpole || gameOver || victory) return;

            const pRect = { x: player.x, y: player.y, w: player.width, h: player.height };
            const fRect = { x: flagpole.x, y: flagpole.y, w: flagpole.w, h: flagpole.h };

            if (checkCollision(pRect, fRect)) {
                triggerVictory();
            }
        }

        // Cloud builder
        function createCloud(x, y, z) {
            const group = new THREE.Group();
            const mat = new THREE.MeshPhongMaterial({ color: 0xffffff, flatShading: true });

            const s1 = new THREE.Mesh(new THREE.SphereGeometry(1, 8, 8), mat);
            const s2 = new THREE.Mesh(new THREE.SphereGeometry(1.3, 8, 8), mat);
            s2.position.set(1, 0.2, 0);
            const s3 = new THREE.Mesh(new THREE.SphereGeometry(0.9, 8, 8), mat);
            s3.position.set(2, -0.1, 0);

            group.add(s1, s2, s3);
            group.position.set(x, y, z);
            scene.add(group);
        }

        // Engine-level restart
        function resetGame() {
            const toRemove = [];
            scene.children.forEach(child => {
                toRemove.push(child);
            });
            toRemove.forEach(child => {
                scene.remove(child);
            });

            scene.add(ambientLight);
            scene.add(dirLight);

            score = 0;
            coinsCount = 0;
            timeRemaining = 400;
            gameOver = false;
            victory = false;

            document.getElementById('score').innerText = '000000';
            document.getElementById('coins').innerText = '00';
            document.getElementById('timer').innerText = '400';
            document.getElementById('game-over').style.display = 'none';
            document.getElementById('victory').style.display = 'none';

            player.x = 2;
            player.y = 2;
            player.vx = 0;
            player.vy = 0;
            player.grounded = false;
            player.mesh = createPlayerMesh();

            buildLevel();

            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (!gameOver && !victory && timeRemaining > 0) {
                    timeRemaining--;
                    document.getElementById('timer').innerText = timeRemaining;
                    if (timeRemaining <= 0) {
                        triggerGameOver();
                    }
                }
            }, 1000);
        }

        function animate() {
            requestAnimationFrame(animate);

            updatePhysics();
            updateEnemies();
            updateCoins();
            updateParticles();
            checkFlagpole();

            renderer.render(scene, camera);
        }

        resetGame();
        animate();
    </script>
</body>
</html>
