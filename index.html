<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2.5D Mario Clone</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Courier New', Courier, monospace; 
            background-color: #5c94fc; 
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 20px;
            text-shadow: 2px 2px 0px #000;
            user-select: none;
            display: flex;
            gap: 40px;
            z-index: 10;
        }
        #game-over, #victory {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 40px;
            text-shadow: 3px 3px 0px #000;
            display: none;
            text-align: center;
            z-index: 10;
        }
        #instructions {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 16px;
            text-shadow: 1px 1px 0px #000;
            z-index: 10;
            background: rgba(0,0,0,0.4);
            padding: 8px 16px;
            border-radius: 5px;
            text-align: center;
        }
    </style>
    <!-- Include Three.js via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="ui">
        <div>MARIO<br><span id="score">000000</span></div>
        <div>COINS<br>x<span id="coins">00</span></div>
        <div>WORLD<br>1-1</div>
        <div>TIME<br><span id="timer">400</span></div>
    </div>
    <div id="game-over">GAME OVER<br><span style="font-size: 20px;">Press R to restart</span></div>
    <div id="victory">YOU WIN!<br><span style="font-size: 20px;">Press R to restart</span></div>
    <div id="instructions">A / D or Arrow Keys to Move • Space / W to Jump • R to Restart</div>

    <script>
        // Game state variables
        let gameOver = false;
        let victory = false;
        let score = 0;
        let coinsCount = 0;
        let timeRemaining = 400;
        let timerInterval = null;

        // Physics Constants
        const GRAVITY = -0.012;
        const TERMINAL_VELOCITY = -0.3;

        // Playable character settings
        const player = {
            width: 0.8,
            height: 1.2,
            x: 2,
            y: 2,
            vx: 0,
            vy: 0,
            speed: 0.12,
            jumpForce: 0.26,
            grounded: false,
            mesh: null
        };

        // Arrays to track game elements
        const solids = [];
        const enemies = [];
        const coins = [];
        let flagpole = null;

        // Three.js setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x5c94fc); // Mario Sky Blue

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(2, 4, 10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Add Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 15);
        scene.add(dirLight);

        // Key listeners
        const keys = { Left: false, Right: false, Jump: false };
        window.addEventListener('keydown', (e) => {
            if (e.code === 'KeyA' || e.code === 'ArrowLeft') keys.Left = true;
            if (e.code === 'KeyD' || e.code === 'ArrowRight') keys.Right = true;
            if (e.code === 'Space' || e.code === 'KeyW' || e.code === 'ArrowUp') keys.Jump = true;
            if (e.code === 'KeyR') resetGame();
        });
        window.addEventListener('keyup', (e) => {
            if (e.code === 'KeyA' || e.code === 'ArrowLeft') keys.Left = false;
            if (e.code === 'KeyD' || e.code === 'ArrowRight') keys.Right = false;
            if (e.code === 'Space' || e.code === 'KeyW' || e.code === 'ArrowUp') keys.Jump = false;
        });

        // Window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Box building helper
        function createBox(x, y, w, h, d, color) {
            const geometry = new THREE.BoxGeometry(w, h, d);
            const material = new THREE.MeshPhongMaterial({ color: color });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(x + w / 2, y + h / 2, 0);
            scene.add(mesh);
            return mesh;
        }

        // Mario-styled character builder (Composite 3D Mesh)
        function createPlayerMesh() {
            const group = new THREE.Group();

            // Red body (Torso)
            const bodyGeo = new THREE.BoxGeometry(0.7, 0.8, 0.7);
            const bodyMat = new THREE.MeshPhongMaterial({ color: 0xE52521 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 0.4;
            group.add(body);

            // Blue pants
            const pantsGeo = new THREE.BoxGeometry(0.72, 0.4, 0.72);
            const pantsMat = new THREE.MeshPhongMaterial({ color: 0x0020C2 });
            const pants = new THREE.Mesh(pantsGeo, pantsMat);
            pants.position.y = 0.2;
            group.add(pants);

            // Head
            const headGeo = new THREE.SphereGeometry(0.24, 16, 16);
            const headMat = new THREE.MeshPhongMaterial({ color: 0xFFCC99 });
            const head = new THREE.Mesh(headGeo, headMat);
            head.position.y = 0.95;
            group.add(head);

            // Red Cap
            const capGeo = new THREE.CylinderGeometry(0.28, 0.28, 0.08, 16);
            const capMat = new THREE.MeshPhongMaterial({ color: 0xE52521 });
            const cap = new THREE.Mesh(capGeo, capMat);
            cap.position.y = 1.12;
            group.add(cap);

            scene.add(group);
            return group;
        }

        // Goomba builder (Composite 3D Mesh)
        function createGoombaMesh() {
            const group = new THREE.Group();

            // Brown cap/head
            const headGeo = new THREE.SphereGeometry(0.4, 16, 16);
            const headMat = new THREE.MeshPhongMaterial({ color: 0x964B00 });
            const head = new THREE.Mesh(headGeo, headMat);
            head.position.y = 0.4;
            group.add(head);

            // White Eyes
            const eyeGeo = new THREE.SphereGeometry(0.08, 8, 8);
            const eyeMat = new THREE.MeshPhongMaterial({ color: 0xFFFFFF });
            const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
            eyeL.position.set(-0.15, 0.45, 0.35);
            const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
            eyeR.position.set(0.15, 0.45, 0.35);
            group.add(eyeL, eyeR);

            // Black Pupils
            const pupilGeo = new THREE.SphereGeometry(0.04, 8, 8);
            const pupilMat = new THREE.MeshPhongMaterial({ color: 0x000000 });
            const pupilL = new THREE.Mesh(pupilGeo, pupilMat);
            pupilL.position.set(-0.15, 0.45, 0.41);
            const pupilR = new THREE.Mesh(pupilGeo, pupilMat);
            pupilR.position.set(0.15, 0.45, 0.41);
            group.add(pupilL, pupilR);

            scene.add(group);
            return group;
        }

        // Green Pipe builder
        function createPipeMesh(x, y, w, h) {
            const group = new THREE.Group();

            // Main shaft
            const shaftGeo = new THREE.CylinderGeometry(w / 2 - 0.1, w / 2 - 0.1, h - 0.4, 24);
            const pipeMat = new THREE.MeshPhongMaterial({ color: 0x00A800 });
            const shaft = new THREE.Mesh(shaftGeo, pipeMat);
            shaft.position.set(x + w / 2, y + (h - 0.4) / 2, 0);
            group.add(shaft);

            // Rim
            const rimGeo = new THREE.CylinderGeometry(w / 2, w / 2, 0.4, 24);
            const rim = new THREE.Mesh(rimGeo, pipeMat);
            rim.position.set(x + w / 2, y + h - 0.2, 0);
            group.add(rim);

            scene.add(group);
            return group;
        }

        // Flagpole builder
        function createFlagpoleMesh(x, y, w, h) {
            const group = new THREE.Group();

            const poleGeo = new THREE.CylinderGeometry(w / 2, w / 2, h, 16);
            const poleMat = new THREE.MeshPhongMaterial({ color: 0xCCCCCC });
            const pole = new THREE.Mesh(poleGeo, poleMat);
            pole.position.set(x + w / 2, y + h / 2, 0);
            group.add(pole);

            const flagGeo = new THREE.BoxGeometry(1.5, 1, 0.05);
            const flagMat = new THREE.MeshPhongMaterial({ color: 0x00FF00 });
            const flag = new THREE.Mesh(flagGeo, flagMat);
            flag.position.set(x - 0.75 + w / 2, y + h - 1, 0);
            group.add(flag);

            scene.add(group);
            return group;
        }

        // Aesthetic background clouds
        function createCloud(x, y, z) {
            const group = new THREE.Group();
            const mat = new THREE.MeshPhongMaterial({ color: 0xffffff, flatShading: true });

            const s1 = new THREE.Mesh(new THREE.SphereGeometry(1, 8, 8), mat);
            const s2 = new THREE.Mesh(new THREE.SphereGeometry(1.3, 8, 8), mat);
            s2.position.set(1, 0.2, 0);
            const s3 = new THREE.Mesh(new THREE.SphereGeometry(0.9, 8, 8), mat);
            s3.position.set(2, -0.1, 0);

            group.add(s1, s2, s3);
            group.position.set(x, y, z);
            scene.add(group);
        }

        // Simple AABB 2D Collision logic
        function checkCollision(r1, r2) {
            return r1.x < r2.x + r2.w &&
                   r1.x + r1.w > r2.x &&
                   r1.y < r2.y + r2.h &&
                   r1.y + r1.h > r2.y;
        }

        // Game state adjustments
        function addScore(amount) {
            score += amount;
            document.getElementById('score').innerText = String(score).padStart(6, '0');
        }

        function addCoin() {
            coinsCount++;
            document.getElementById('coins').innerText = String(coinsCount).padStart(2, '0');
            addScore(200);
        }

        function triggerGameOver() {
            if (gameOver || victory) return;
            gameOver = true;
            document.getElementById('game-over').style.display = 'block';
        }

        function triggerVictory() {
            if (gameOver || victory) return;
            victory = true;
            document.getElementById('victory').style.display = 'block';
        }

        // Animated coin effect when hitting a question block
        function spawnCoinFromBlock(x, y) {
            addCoin();
            const geometry = new THREE.CylinderGeometry(0.25, 0.25, 0.08, 16);
            const material = new THREE.MeshPhongMaterial({ color: 0xFFD700 });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.rotation.x = Math.PI / 2;
            mesh.position.set(x, y, 0);
            scene.add(mesh);

            let frame = 0;
            function animateCoin() {
                if (frame < 12) {
                    mesh.position.y += 0.18;
                    mesh.rotation.y += 0.15;
                    frame++;
                    requestAnimationFrame(animateCoin);
                } else {
                    scene.remove(mesh);
                }
            }
            animateCoin();
        }

        // Construct world level logic
        function buildLevel() {
            enemies.length = 0;
            coins.length = 0;
            solids.length = 0;

            // Clouds
            createCloud(5, 7, -4);
            createCloud(18, 9, -5);
            createCloud(32, 8, -4);
            createCloud(48, 10, -6);
            createCloud(62, 7, -4);

            // Level Blueprint Data
            const levelBlueprint = [
                // Ground Segments
                { type: 'ground', x: 0, y: -1, w: 20, h: 2 },
                { type: 'ground', x: 23, y: -1, w: 18, h: 2 },
                { type: 'ground', x: 45, y: -1, w: 30, h: 2 },

                // Green Pipes
                { type: 'pipe', x: 11, y: 1, w: 2, h: 2 },
                { type: 'pipe', x: 33, y: 1, w: 2, h: 3 },

                // Standard blocks and items
                { type: 'brick', x: 6, y: 4, w: 1, h: 1 },
                { type: 'qblock', x: 7, y: 4, w: 1, h: 1 },
                { type: 'brick', x: 8, y: 4, w: 1, h: 1 },
                { type: 'qblock', x: 9, y: 4, w: 1, h: 1 },
                { type: 'brick', x: 10, y: 4, w: 1, h: 1 },

                // Segment 2 layout
                { type: 'brick', x: 26, y: 4, w: 3, h: 1 },
                { type: 'qblock', x: 29, y: 7, w: 1, h: 1 },
                { type: 'brick', x: 31, y: 4, w: 2, h: 1 },

                // Segment 3 Steps
                { type: 'stair', x: 50, y: 1, w: 4, h: 1 },
                { type: 'stair', x: 51, y: 2, w: 3, h: 1 },
                { type: 'stair', x: 52, y: 3, w: 2, h: 1 },
                { type: 'stair', x: 53, y: 4, w: 1, h: 1 },

                // Goal flagpole
                { type: 'flagpole', x: 65, y: 1, w: 0.2, h: 8 }
            ];

            // Render blueprints into active objects
            levelBlueprint.forEach(block => {
                if (block.type === 'ground') {
                    // Two-part visual: Earth base and lush grass top layer
                    createBox(block.x, block.y, block.w, block.h - 0.2, 1.2, 0x8B4513);
                    createBox(block.x, block.y + block.h - 0.2, block.w, 0.2, 1.25, 0x228B22);
                    solids.push(block);
                }
                else if (block.type === 'brick') {
                    block.mesh = createBox(block.x, block.y, block.w, block.h, 1, 0xCD853F);
                    solids.push(block);
                }
                else if (block.type === 'qblock') {
                    block.mesh = createBox(block.x, block.y, block.w, block.h, 1, 0xFFD700);
                    block.hit = false;
                    solids.push(block);
                }
                else if (block.type === 'stair') {
                    createBox(block.x, block.y, block.w, block.h, 1, 0xD2B48C);
                    solids.push({ type: 'stair', x: block.x, y: block.y, w: block.w, h: block.h });
                }
                else if (block.type === 'pipe') {
                    block.mesh = createPipeMesh(block.x, block.y, block.w, block.h);
                    solids.push({ type: 'pipe', x: block.x, y: block.y, w: block.w, h: block.h });
                }
                else if (block.type === 'flagpole') {
                    block.mesh = createFlagpoleMesh(block.x, block.y, block.w, block.h);
                    flagpole = block;
                }
            });

            // Add standard air-floating Gold Coins
            const coinPositions = [
                { x: 7, y: 5 }, { x: 9, y: 5 },
                { x: 27, y: 5 }, { x: 28, y: 5 },
                { x: 52, y: 4.5 }
            ];
            coinPositions.forEach(loc => {
                const coin = { x: loc.x, y: loc.y, w: 0.6, h: 0.6, collected: false, mesh: null };
                const coinGeo = new THREE.CylinderGeometry(0.24, 0.24, 0.08, 16);
                const coinMat = new THREE.MeshPhongMaterial({ color: 0xFFD700 });
                const mesh = new THREE.Mesh(coinGeo, coinMat);
                mesh.rotation.x = Math.PI / 2;
                mesh.position.set(coin.x + coin.w / 2, coin.y + coin.h / 2, 0);
                scene.add(mesh);
                coin.mesh = mesh;
                coins.push(coin);
            });

            // Add Enemies
            const enemyPositions = [
                { x: 14, y: 1.5 },
                { x: 28, y: 1.5 },
                { x: 58, y: 1.5 }
            ];
            enemyPositions.forEach(loc => {
                const enemy = { x: loc.x, y: loc.y, vx: -0.04, vy: 0, w: 0.8, h: 0.8, alive: true, mesh: null };
                enemy.mesh = createGoombaMesh();
                enemies.push(enemy);
            });
        }

        // System physics cycles
        function updatePhysics() {
            if (gameOver || victory) return;

            // X-axis input calculations
            if (keys.Left) {
                player.vx = -player.speed;
            } else if (keys.Right) {
                player.vx = player.speed;
            } else {
                player.vx *= 0.8;
                if (Math.abs(player.vx) < 0.01) player.vx = 0;
            }

            // Apply X movement
            player.x += player.vx;
            resolveCollisions('x');

            // Y-axis input calculations (Gravity & jumping)
            player.vy += GRAVITY;
            if (player.vy < TERMINAL_VELOCITY) player.vy = TERMINAL_VELOCITY;

            if (keys.Jump && player.grounded) {
                player.vy = player.jumpForce;
                player.grounded = false;
            }

            // Apply Y movement
            player.y += player.vy;
            player.grounded = false;
            resolveCollisions('y');

            // Check pit limits
            if (player.y < -5) {
                triggerGameOver();
            }

            // Bind player mesh coordinates
            player.mesh.position.set(player.x + player.width / 2, player.y + player.height / 2, 0);

            // Follow player with camera
            camera.position.x = player.x + player.width / 2;
            camera.position.y = Math.max(4, player.y + 2);
            camera.lookAt(camera.position.x, 3, 0);
        }

        function resolveCollisions(axis) {
            const pRect = { x: player.x, y: player.y, w: player.width, h: player.height };

            for (let block of solids) {
                const bRect = { x: block.x, y: block.y, w: block.w, h: block.h };

                if (checkCollision(pRect, bRect)) {
                    if (axis === 'x') {
                        if (player.vx > 0) {
                            player.x = block.x - player.width;
                        } else if (player.vx < 0) {
                            player.x = block.x + block.w;
                        }
                        player.vx = 0;
                    } 
                    else if (axis === 'y') {
                        if (player.vy < 0) {
                            player.y = block.y + block.h;
                            player.grounded = true;
                        } else if (player.vy > 0) {
                            player.y = block.y - player.height;

                            // Break or interact with block
                            if (block.type === 'qblock' && !block.hit) {
                                block.hit = true;
                                block.mesh.material.color.setHex(0x8B7500); // Change to a hit/empty block color
                                spawnCoinFromBlock(block.x + block.w / 2, block.y + block.h + 0.5);
                            }
                        }
                        player.vy = 0;
                    }
                    pRect.x = player.x;
                    pRect.y = player.y;
                }
            }
        }

        // Handle enemy behavior cycles
        function updateEnemies() {
            if (gameOver || victory) return;

            enemies.forEach(enemy => {
                if (!enemy.alive) return;

                // Move horizontally
                enemy.x += enemy.vx;

                // Stop or bounce on wall
                let eRect = { x: enemy.x, y: enemy.y, w: enemy.w, h: enemy.h };
                for (let block of solids) {
                    const bRect = { x: block.x, y: block.y, w: block.w, h: block.h };
                    if (checkCollision(eRect, bRect)) {
                        enemy.vx = -enemy.vx;
                        enemy.x += enemy.vx;
                        break;
                    }
                }

                // Apply gravity to enemies
                enemy.vy += GRAVITY;
                enemy.y += enemy.vy;

                // Landing resolution
                eRect = { x: enemy.x, y: enemy.y, w: enemy.w, h: enemy.h };
                for (let block of solids) {
                    const bRect = { x: block.x, y: block.y, w: block.w, h: block.h };
                    if (checkCollision(eRect, bRect)) {
                        if (enemy.vy < 0) {
                            enemy.y = block.y + block.h;
                            enemy.vy = 0;
                        }
                    }
                }

                if (enemy.y < -5) {
                    enemy.alive = false;
                    scene.remove(enemy.mesh);
                    return;
                }

                // Update physical representation
                enemy.mesh.position.set(enemy.x + enemy.w / 2, enemy.y + enemy.h / 2, 0);

                // Interactions with Player
                const pRect = { x: player.x, y: player.y, w: player.width, h: player.height };
                eRect = { x: enemy.x, y: enemy.y, w: enemy.w, h: enemy.h };

                if (checkCollision(pRect, eRect)) {
                    // Stomped on from top?
                    if (player.vy < 0 && player.y > enemy.y + enemy.h * 0.35) {
                        enemy.alive = false;
                        scene.remove(enemy.mesh);
                        player.vy = 0.22; // Mario bounces up
                        addScore(100);
                    } else {
                        // Mario killed
                        triggerGameOver();
                    }
                }
            });
        }

        // Rotates and checks standard coin collections
        function updateCoins() {
            coins.forEach(coin => {
                if (coin.collected) return;

                coin.mesh.rotation.y += 0.05;

                const pRect = { x: player.x, y: player.y, w: player.width, h: player.height };
                const cRect = { x: coin.x, y: coin.y, w: coin.w, h: coin.h };

                if (checkCollision(pRect, cRect)) {
                    coin.collected = true;
                    scene.remove(coin.mesh);
                    addCoin();
                }
            });
        }

        // Checks for win trigger on flagpole
        function checkFlagpole() {
            if (!flagpole || gameOver || victory) return;

            const pRect = { x: player.x, y: player.y, w: player.width, h: player.height };
            const fRect = { x: flagpole.x, y: flagpole.y, w: flagpole.w, h: flagpole.h };

            if (checkCollision(pRect, fRect)) {
                triggerVictory();
            }
        }

        // Comprehensive game reset cycle
        function resetGame() {
            // Safe removal of all existing meshes/scene items
            const toRemove = [];
            scene.children.forEach(child => {
                toRemove.push(child);
            });
            toRemove.forEach(child => {
                scene.remove(child);
            });

            // Reapply basic configuration lights
            scene.add(ambientLight);
            scene.add(dirLight);

            // Interface properties resetting
            score = 0;
            coinsCount = 0;
            timeRemaining = 400;
            gameOver = false;
            victory = false;

            document.getElementById('score').innerText = '000000';
            document.getElementById('coins').innerText = '00';
            document.getElementById('timer').innerText = '400';
            document.getElementById('game-over').style.display = 'none';
            document.getElementById('victory').style.display = 'none';

            // Resetting player configuration
            player.x = 2;
            player.y = 2;
            player.vx = 0;
            player.vy = 0;
            player.grounded = false;
            player.mesh = createPlayerMesh();

            // Run construction
            buildLevel();

            // Reset timer sequence
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (!gameOver && !victory && timeRemaining > 0) {
                    timeRemaining--;
                    document.getElementById('timer').innerText = timeRemaining;
                    if (timeRemaining <= 0) {
                        triggerGameOver();
                    }
                }
            }, 1000);
        }

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);

            updatePhysics();
            updateEnemies();
            updateCoins();
            checkFlagpole();

            renderer.render(scene, camera);
        }

        // Start initial setups
        resetGame();
        animate();
    </script>
</body>
</html>
